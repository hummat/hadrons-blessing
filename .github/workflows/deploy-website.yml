name: Deploy Website

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build root project
        run: npm run build

      - name: Provision pinned Darktide source snapshot
        run: |
          PINNED_SHA=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/ground-truth/source-snapshots/manifest.json','utf8')).git_revision)")
          git init ../Darktide-Source-Code
          cd ../Darktide-Source-Code
          git remote add origin https://github.com/Aussiemon/Darktide-Source-Code.git
          git fetch --depth 1 origin "$PINNED_SHA"
          git checkout FETCH_HEAD

      - name: Generate build data
        env:
          GROUND_TRUTH_SOURCE_ROOT: ../Darktide-Source-Code
        run: |
          npm run breeds:build
          npm run profiles:build
          npm run effects:build
          npm run stagger:build
          npm run index:build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Generate website data
        working-directory: website
        run: npx tsx scripts/generate-data.ts

      - name: Build website
        working-directory: website
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
